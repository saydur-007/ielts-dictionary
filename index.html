<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS Dictionary</title>

<style>
body{
    margin:0;
    padding:25px;
    font-family:Arial,sans-serif;
    background:#202124;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.search-box{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px 15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 22px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#45a049;
}

button:disabled{
    background:#666;
    cursor:not-allowed;
}

#result{
    margin-top:20px;
    line-height:1.8;
}

hr{
    border:0;
    border-top:1px solid #444;
    margin:18px 0;
}

h3{
    color:#FFC107;
}

.loading{
    color:#4CAF50;
}

.word-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:5px;
}

.phonetic{
    color:#9aa0a6;
    font-size:16px;
    margin-bottom:10px;
}

.pos{
    display:inline-block;
    background:#4CAF50;
    color:white;
    padding:3px 10px;
    border-radius:6px;
    font-size:13px;
    font-style:italic;
    margin:10px 0 6px 0;
}

.def-item{
    margin:8px 0 8px 20px;
}

.def-number{
    color:#FFC107;
    font-weight:bold;
    margin-right:6px;
}

.example{
    color:#9aa0a6;
    font-style:italic;
    margin-left:26px;
}

.synonyms{
    margin-left:26px;
    color:#8ab4f8;
    font-size:14px;
}

.error-box{
    text-align:center;
    color:#f28b82;
}

.play-btn{
    background:#2f9e44;
}

.bangla{
    margin-top:6px;
    font-size:17px;
    color:#a5d6ff;
    font-family:'Noto Sans Bengali','Nirmala UI',Arial,sans-serif;
}

.bangla-label{
    color:#9aa0a6;
    font-size:13px;
    margin-right:6px;
    font-family:Arial,sans-serif;
}

.word-image{
    width:100%;
    max-width:320px;
    border-radius:10px;
    margin:12px 0;
    display:block;
    object-fit:cover;
}

.image-credit{
    font-size:11px;
    color:#666;
    margin-top:-8px;
    margin-bottom:12px;
}
</style>
</head>

<body>

<h2>📖 Dictionary</h2>

<div class="search-box">
    <input
        id="word"
        type="text"
        placeholder="Search a word..."
    >

    <button id="searchBtn">
        Search
    </button>
</div>

<div id="result"></div>

<script>
const input = document.getElementById("word");
const button = document.getElementById("searchBtn");
const result = document.getElementById("result");

let currentAudio = null;

// Search button
button.addEventListener("click", searchWord);

// Enter key - use keydown so it fires reliably, and stop it from
// bubbling up (some embed hosts like Notion can otherwise swallow it)
input.addEventListener("keydown", function (event) {
    if (event.key === "Enter" || event.keyCode === 13) {
        event.preventDefault();
        event.stopPropagation();
        searchWord();
    }
});

// Auto focus
window.onload = function () {
    input.focus();
};

async function searchWord() {

    const word = input.value.trim();

    if (!word) return;

    button.disabled = true;
    result.innerHTML = '<p class="loading">🔍 Searching...</p>';

    try {

        const response = await fetch(
            `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`
        );

        if (!response.ok) {
            throw new Error();
        }

        const data = await response.json();

        // Fetch Bangla translation and a picture at the same time
        const [banglaText, imageInfo] = await Promise.all([
            fetchBangla(word),
            fetchImage(word)
        ]);

        renderResult(data[0], banglaText, imageInfo);

    } catch {

        result.innerHTML = `
            <div class="error-box">
                <h2>❌ Word Not Found</h2>
                <p>Please check your spelling.</p>
            </div>
        `;

    } finally {
        button.disabled = false;
    }

}

async function fetchBangla(word) {
    try {
        const res = await fetch(
            `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|bn`
        );
        if (!res.ok) return "";
        const data = await res.json();
        return (data && data.responseData && data.responseData.translatedText) || "";
    } catch {
        return "";
    }
}

async function fetchImage(word) {
    try {
        const res = await fetch(
            `https://api.openverse.org/v1/images/?q=${encodeURIComponent(word)}&page_size=1`
        );
        if (!res.ok) return null;
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const img = data.results[0];
            return {
                url: img.thumbnail || img.url,
                credit: img.creator ? `Photo by ${img.creator}` : ""
            };
        }
        return null;
    } catch {
        return null;
    }
}

function renderResult(entry, banglaText, imageInfo) {

    const wordText = entry.word || "";

    // Find a phonetic text, preferring one that has an audio file too
    let phoneticText = entry.phonetic || "";
    let audioUrl = "";

    if (Array.isArray(entry.phonetics)) {
        for (const p of entry.phonetics) {
            if (!phoneticText && p.text) phoneticText = p.text;
            if (!audioUrl && p.audio) audioUrl = p.audio;
        }
    }

    let html = `<div class="word-title">${escapeHtml(wordText)}</div>`;

    if (phoneticText) {
        html += `<div class="phonetic">Pronunciation: ${escapeHtml(phoneticText)}</div>`;
    }

    if (banglaText) {
        html += `<div class="bangla"><span class="bangla-label">বাংলা:</span>${escapeHtml(banglaText)}</div>`;
    }

    if (audioUrl) {
        html += `<button class="play-btn" onclick="playAudio('${audioUrl.replace(/'/g, "\\'")}')">🔊 Play Pronunciation</button>`;
    }

    if (imageInfo && imageInfo.url) {
        html += `<img class="word-image" src="${escapeHtml(imageInfo.url)}" alt="${escapeHtml(wordText)}" onerror="this.style.display='none'">`;
        if (imageInfo.credit) {
            html += `<div class="image-credit">${escapeHtml(imageInfo.credit)}</div>`;
        }
    }

    if (Array.isArray(entry.meanings)) {
        entry.meanings.forEach(meaning => {

            html += `<hr><div class="pos">${escapeHtml(meaning.partOfSpeech || "")}</div>`;

            if (Array.isArray(meaning.definitions)) {
                meaning.definitions.slice(0, 4).forEach((def, i) => {

                    html += `<div class="def-item"><span class="def-number">${i + 1}.</span>${escapeHtml(def.definition || "")}</div>`;

                    if (def.example) {
                        html += `<div class="example">e.g. "${escapeHtml(def.example)}"</div>`;
                    }

                });
            }

            if (Array.isArray(meaning.synonyms) && meaning.synonyms.length > 0) {
                html += `<div class="synonyms">Synonyms: ${meaning.synonyms.slice(0, 6).map(escapeHtml).join(", ")}</div>`;
            }

        });
    }

    result.innerHTML = html;

}

function playAudio(url) {
    if (currentAudio) {
        currentAudio.pause();
    }
    currentAudio = new Audio(url);
    currentAudio.play();
}

function escapeHtml(str) {
    if (typeof str !== "string") return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
