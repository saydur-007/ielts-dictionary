<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS Dictionary</title>

<style>
body{
    margin:0;
    padding:25px;
    font-family:Arial,sans-serif;
    background:#202124;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.search-box{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:20px;
}

input{

    flex:1;
    padding:12px 15px;
    font-size:16px;

    border:none;
    border-radius:10px;

    outline:none;

}

button{

    padding:12px 22px;

    background:#4CAF50;
    color:white;

    border:none;

    border-radius:10px;

    font-size:15px;

    cursor:pointer;

    transition:.25s;

}

button:hover{

    background:#45a049;

}

#result{

    margin-top:20px;

    line-height:1.8;

}

hr{

    border:0;

    border-top:1px solid #444;

    margin:18px 0;

}

h3{

    color:#FFC107;

}

.loading{

    color:#4CAF50;

}
</style>

</head>
<body>

<h2>Dictionary</h2>

<input id="word" placeholder="Enter a word">
<button onclick="searchWord()">Search</button>

<div id="result"></div>

<script>
const input = document.getElementById("word");
const button = document.getElementById("searchBtn");
const result = document.getElementById("result");

button.addEventListener("click", searchWord);

input.addEventListener("keypress", function(e){

    if(e.key==="Enter"){

        e.preventDefault();

        searchWord();

    }

});

async function searchWord(){

    const word=input.value.trim();

    if(word===""){

        result.innerHTML="<p>Please enter a word.</p>";

        return;

    }

    result.innerHTML="<p class='loading'>🔍 Searching...</p>";

    try{

        const response=await fetch(
            `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`
        );

        if(!response.ok){

            throw new Error();

        }

        const data=await response.json();

        const d=data[0];

        let html="";

        html+=`<h2>${d.word}</h2>`;

        if(d.phonetic){

            html+=`<p><b>Pronunciation:</b> ${d.phonetic}</p>`;

        }

        const audio=d.phonetics.find(x=>x.audio);

        if(audio){

            html+=`
            <button onclick="new Audio('${audio.audio}').play()">
            🔊 Play Pronunciation
            </button><br><br>
            `;

        }

        d.meanings.forEach(m=>{

            html+=`<hr>`;

            html+=`<h3>${m.partOfSpeech}</h3>`;

            html+=`<p><b>Meaning:</b><br>${m.definitions[0].definition}</p>`;

            if(m.definitions[0].example){

                html+=`<p><b>Example:</b><br>${m.definitions[0].example}</p>`;

            }

            if(m.synonyms.length){

                html+=`<p><b>Synonyms:</b><br>${m.synonyms.slice(0,10).join(", ")}</p>`;

            }

            if(m.antonyms.length){

                html+=`<p><b>Antonyms:</b><br>${m.antonyms.slice(0,10).join(", ")}</p>`;

            }

        });

        result.innerHTML=html;

    }

    catch{

        result.innerHTML=`
        <h2>❌ Word Not Found</h2>
        <p>Please check your spelling.</p>
        `;

    }

}
</script>

</body>
</html>
