<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS Dictionary</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#202124;
    color:white;
    padding:20px;
}

input{
    width:250px;
    padding:10px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#result{
    margin-top:20px;
}
</style>

</head>
<body>

<h2>📖 IELTS Dictionary</h2>

<input id="word" placeholder="Enter a word">
<button onclick="searchWord()">Search</button>

<div id="result"></div>

<script>
async function searchWord(){

    const word=document.getElementById("word").value;

    const response=await fetch(
        `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
    );

    const data=await response.json();

    if(data.title){
        document.getElementById("result").innerHTML="Word not found.";
        return;
    }

    const d=data[0];

    let html="";

    html+=`<h2>${d.word}</h2>`;

    if(d.phonetic)
        html+=`<p><b>Pronunciation:</b> ${d.phonetic}</p>`;

    const meaning=d.meanings[0];

    html+=`<p><b>Part of Speech:</b> ${meaning.partOfSpeech}</p>`;

    html+=`<p><b>Meaning:</b> ${meaning.definitions[0].definition}</p>`;

    if(meaning.definitions[0].example)
        html+=`<p><b>Example:</b> ${meaning.definitions[0].example}</p>`;

    if(meaning.synonyms.length>0)
        html+=`<p><b>Synonyms:</b> ${meaning.synonyms.join(", ")}</p>`;

    if(meaning.antonyms.length>0)
        html+=`<p><b>Antonyms:</b> ${meaning.antonyms.join(", ")}</p>`;

    document.getElementById("result").innerHTML=html;

}
</script>

</body>
</html>
