<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IELTS Dictionary</title>

<style>
body{
    margin:0;
    padding:25px;
    font-family:Arial,sans-serif;
    background:#202124;
    color:white;
}

.container{
    max-width:100%;
}

.search-box{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:12px 15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 22px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#45a049;
}

button:disabled{
    background:#666;
    cursor:not-allowed;
}

#result{
    margin-top:20px;
    line-height:1.8;
}

.result-grid{
    display:grid;
    grid-template-columns:300px 1fr;
    gap:32px;
}

.left-col{
    min-width:0;
}

.right-col{
    min-width:0;
}

@media (max-width:700px){
    .result-grid{
        grid-template-columns:1fr;
    }
}

hr{
    border:0;
    border-top:1px solid #444;
    margin:18px 0;
}

h3{
    color:#FFC107;
}

.loading{
    color:#4CAF50;
}

.word-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:5px;
}

.phonetic{
    color:#9aa0a6;
    font-size:16px;
    margin-bottom:10px;
}

.pos{
    display:inline-block;
    background:#4CAF50;
    color:white;
    padding:3px 10px;
    border-radius:6px;
    font-size:13px;
    font-style:italic;
    margin:10px 0 6px 0;
}

.meaning-block{
    margin-bottom:18px;
}

.def-item{
    background:#2a2b2e;
    border-left:3px solid #4CAF50;
    border-radius:8px;
    padding:10px 14px;
    margin:8px 0;
}

.def-number{
    color:#FFC107;
    font-weight:bold;
    margin-right:6px;
}

.example{
    color:#9aa0a6;
    font-style:italic;
    font-size:14px;
    margin-top:6px;
    padding-left:2px;
}

.tag-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px;
    margin:10px 2px 0 2px;
}

.tag-label{
    color:#9aa0a6;
    font-size:12px;
    margin-right:2px;
}

.tag{
    display:inline-block;
    padding:3px 10px;
    border-radius:12px;
    font-size:12px;
    background:#1f2a3d;
    color:#8ab4f8;
}

.tag.antonym{
    background:#3d1f1f;
    color:#f28b82;
}

.error-box{
    text-align:center;
    color:#f28b82;
}

.play-btn{
    background:#2f9e44;
}

.bangla{
    margin-top:6px;
    font-size:17px;
    color:#a5d6ff;
    font-family:'Noto Sans Bengali','Nirmala UI',Arial,sans-serif;
}

.bangla-label{
    color:#9aa0a6;
    font-size:13px;
    margin-right:6px;
    font-family:Arial,sans-serif;
}

.word-image{
    width:100%;
    border-radius:10px;
    margin:12px 0;
    display:block;
    object-fit:cover;
}

.image-credit{
    font-size:11px;
    color:#666;
    margin-top:-8px;
    margin-bottom:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="search-box">
    <input
        id="word"
        type="text"
        placeholder="Search a word (English or বাংলা)..."
    >

    <button id="searchBtn">
        Search
    </button>
</div>

<div id="result"></div>

</div>

<script>
const input = document.getElementById("word");
const button = document.getElementById("searchBtn");
const result = document.getElementById("result");

let currentAudio = null;

// Search button
button.addEventListener("click", searchWord);

// Enter key - use keydown so it fires reliably, and stop it from
// bubbling up (some embed hosts like Notion can otherwise swallow it)
input.addEventListener("keydown", function (event) {
    if (event.key === "Enter" || event.keyCode === 13) {
        event.preventDefault();
        event.stopPropagation();
        searchWord();
    }
});

// Auto focus
window.onload = function () {
    input.focus();
};

// Detect Bangla script (Unicode block U+0980–U+09FF)
function isBangla(text) {
    return /[\u0980-\u09FF]/.test(text);
}

async function searchWord() {

    const rawInput = input.value.trim();

    if (!rawInput) return;

    button.disabled = true;
    result.innerHTML = '<p class="loading">🔍 Searching...</p>';

    try {

        let englishWord = rawInput;
        let banglaText = "";

        if (isBangla(rawInput)) {
            // User typed Bangla -> translate to English first, then look that up
            englishWord = await translateText(rawInput, "bn", "en");
            if (!englishWord) throw new Error();
            banglaText = rawInput;
        }

        const response = await fetch(
            `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(englishWord)}`
        );

        if (!response.ok) {
            throw new Error();
        }

        const data = await response.json();

        // If we started from English, still fetch the Bangla translation for display.
        // If we started from Bangla, we already have it (the original input).
        const [banglaFinal, imageInfo] = await Promise.all([
            banglaText ? Promise.resolve(banglaText) : translateText(englishWord, "en", "bn"),
            fetchImage(englishWord)
        ]);

        renderResult(data[0], banglaFinal, imageInfo);

    } catch {

        result.innerHTML = `
            <div class="error-box">
                <h2>❌ Word Not Found</h2>
                <p>Please check your spelling.</p>
            </div>
        `;

    } finally {
        button.disabled = false;
    }

}

// Generic translator: sl = source language, tl = target language (e.g. "en", "bn")
async function translateText(text, sl, tl) {

    // Primary source: Google Translate's public endpoint.
    // Much more reliable for single common words than MyMemory,
    // which can return unrelated stored phrases from its shared memory.
    try {
        const res = await fetch(
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`
        );
        if (res.ok) {
            const data = await res.json();
            const translated = data && data[0] && data[0][0] && data[0][0][0];
            if (translated && translated.trim()) {
                return translated.trim();
            }
        }
    } catch {
        // fall through to backup source
    }

    // Fallback: MyMemory (kept as backup in case Google endpoint is blocked)
    try {
        const res = await fetch(
            `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sl}|${tl}`
        );
        if (!res.ok) return "";
        const data = await res.json();
        const result = (data && data.responseData && data.responseData.translatedText) || "";
        // Skip obviously bad matches (MyMemory sometimes echoes the input back untranslated)
        if (result && result.toLowerCase().trim() !== text.toLowerCase().trim()) {
            return result;
        }
        return "";
    } catch {
        return "";
    }
}

async function fetchImage(word) {
    try {
        const res = await fetch(
            `https://api.openverse.org/v1/images/?q=${encodeURIComponent(word)}&page_size=1`
        );
        if (!res.ok) return null;
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const img = data.results[0];
            return {
                url: img.thumbnail || img.url,
                credit: img.creator ? `Photo by ${img.creator}` : ""
            };
        }
        return null;
    } catch {
        return null;
    }
}

function renderResult(entry, banglaText, imageInfo) {

    const wordText = entry.word || "";

    // Find a phonetic text, preferring one that has an audio file too
    let phoneticText = entry.phonetic || "";
    let audioUrl = "";

    if (Array.isArray(entry.phonetics)) {
        for (const p of entry.phonetics) {
            if (!phoneticText && p.text) phoneticText = p.text;
            if (!audioUrl && p.audio) audioUrl = p.audio;
        }
    }

    let leftHtml = `<div class="word-title">${escapeHtml(wordText)}</div>`;

    if (phoneticText) {
        leftHtml += `<div class="phonetic">Pronunciation: ${escapeHtml(phoneticText)}</div>`;
    }

    if (banglaText) {
        leftHtml += `<div class="bangla"><span class="bangla-label">বাংলা:</span>${escapeHtml(banglaText)}</div>`;
    }

    if (audioUrl) {
        leftHtml += `<button class="play-btn" onclick="playAudio('${audioUrl.replace(/'/g, "\\'")}')">🔊 Play Pronunciation</button>`;
    }

    if (imageInfo && imageInfo.url) {
        leftHtml += `<img class="word-image" src="${escapeHtml(imageInfo.url)}" alt="${escapeHtml(wordText)}" onerror="this.style.display='none'">`;
        if (imageInfo.credit) {
            leftHtml += `<div class="image-credit">${escapeHtml(imageInfo.credit)}</div>`;
        }
    }

    let rightHtml = "";

    if (Array.isArray(entry.meanings)) {
        entry.meanings.forEach((meaning, idx) => {

            if (idx > 0) rightHtml += `<hr>`;
            rightHtml += `<div class="meaning-block">`;
            rightHtml += `<div class="pos">${escapeHtml(meaning.partOfSpeech || "")}</div>`;

            if (Array.isArray(meaning.definitions)) {
                meaning.definitions.slice(0, 4).forEach((def, i) => {

                    rightHtml += `<div class="def-item"><span class="def-number">${i + 1}.</span>${escapeHtml(def.definition || "")}`;

                    if (def.example) {
                        rightHtml += `<div class="example">e.g. "${escapeHtml(def.example)}"</div>`;
                    }

                    rightHtml += `</div>`;

                });
            }

            // Merge synonyms/antonyms found at both the meaning level and
            // the individual definition level, de-duplicated.
            const synonyms = collectUnique(meaning, "synonyms");
            const antonyms = collectUnique(meaning, "antonyms");

            if (synonyms.length > 0) {
                rightHtml += `<div class="tag-row"><span class="tag-label">Synonyms:</span>`;
                rightHtml += synonyms.slice(0, 6).map(s => `<span class="tag">${escapeHtml(s)}</span>`).join("");
                rightHtml += `</div>`;
            }

            if (antonyms.length > 0) {
                rightHtml += `<div class="tag-row"><span class="tag-label">Antonyms:</span>`;
                rightHtml += antonyms.slice(0, 6).map(a => `<span class="tag antonym">${escapeHtml(a)}</span>`).join("");
                rightHtml += `</div>`;
            }

            rightHtml += `</div>`;

        });
    }

    result.innerHTML = `
        <div class="result-grid">
            <div class="left-col">${leftHtml}</div>
            <div class="right-col">${rightHtml}</div>
        </div>
    `;

}

// Gathers a de-duplicated list of terms (synonyms/antonyms) from both the
// meaning level and each individual definition within that meaning.
function collectUnique(meaning, key) {
    const set = new Set();

    if (Array.isArray(meaning[key])) {
        meaning[key].forEach(term => term && set.add(term));
    }

    if (Array.isArray(meaning.definitions)) {
        meaning.definitions.forEach(def => {
            if (Array.isArray(def[key])) {
                def[key].forEach(term => term && set.add(term));
            }
        });
    }

    return Array.from(set);
}

function playAudio(url) {
    if (currentAudio) {
        currentAudio.pause();
    }
    currentAudio = new Audio(url);
    currentAudio.play();
}

function escapeHtml(str) {
    if (typeof str !== "string") return "";
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
